# =============================================================================
# DOST PAGASA - Infrastructure Deployment Pipeline
# Each service deploys as its own independent stack
# =============================================================================
name: Deploy Infrastructure

on:
  workflow_dispatch:
    inputs:
      stack:
        description: "Stack to deploy"
        required: true
        type: choice
        options:
          - network
          - security-dev
          - security-staging
          - security-prod
          - certificates
          - cache
          - storage
          - compute-dev
          - compute-staging
          - compute-prod

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-southeast-1

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install cfn-lint
      - run: cfn-lint cloudformation/templates/*.yaml

  deploy:
    name: Deploy ${{ github.event.inputs.stack }}
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Cleanup failed stack if exists
        run: |
          STACK="${{ github.event.inputs.stack }}"
          case "$STACK" in
            compute-dev|compute-staging|compute-prod|security-dev|security-staging|security-prod)
              STACK_NAME="dost-pagasa-${STACK}"
              ;;
            *)
              STACK_NAME="dost-pagasa-${STACK}"
              ;;
          esac
          STATUS=$(aws cloudformation describe-stacks --stack-name "$STACK_NAME" \
            --query "Stacks[0].StackStatus" --output text 2>/dev/null || echo "DOES_NOT_EXIST")
          if [ "$STATUS" = "ROLLBACK_COMPLETE" ]; then
            echo "🗑️ Deleting failed stack $STACK_NAME..."
            aws cloudformation delete-stack --stack-name "$STACK_NAME"
            aws cloudformation wait stack-delete-complete --stack-name "$STACK_NAME"
            echo "✅ Cleaned up"
          fi

      - name: Deploy stack
        run: |
          STACK="${{ github.event.inputs.stack }}"
          echo "🎯 Deploying: $STACK"
          echo "📂 Template files:"
          ls -la cloudformation/templates/compute.yaml
          echo "📋 Checking exports:"
          aws cloudformation list-exports --query "Exports[*].Name" --output text
          STACK="${{ github.event.inputs.stack }}"

          case "$STACK" in
            network)
              aws cloudformation deploy \
                --stack-name dost-pagasa-network \
                --template-file cloudformation/templates/network.yaml \
                --parameter-overrides \
                  BastionKeyPairName=dost-pagasa-bastion-key \
                --capabilities CAPABILITY_NAMED_IAM \
                --tags Project=DOST-PAGASA \
                --no-fail-on-empty-changeset
              ;;
            security-dev|security-staging|security-prod)
              ENV="${STACK#security-}"
              aws cloudformation deploy \
                --stack-name "dost-pagasa-security-${ENV}" \
                --template-file cloudformation/templates/security.yaml \
                --parameter-overrides Environment=$ENV \
                --tags Project=DOST-PAGASA Environment=${ENV} \
                --no-fail-on-empty-changeset
              ;;
            certificates)
              aws cloudformation deploy \
                --stack-name dost-pagasa-certificates \
                --template-file cloudformation/templates/certificates.yaml \
                --tags Project=DOST-PAGASA \
                --no-fail-on-empty-changeset
              ;;
            cache)
              aws cloudformation deploy \
                --stack-name dost-pagasa-cache \
                --template-file cloudformation/templates/cache.yaml \
                --tags Project=DOST-PAGASA \
                --no-fail-on-empty-changeset
              ;;
            storage)
              aws cloudformation deploy \
                --stack-name dost-pagasa-storage \
                --template-file cloudformation/templates/storage.yaml \
                --tags Project=DOST-PAGASA \
                --no-fail-on-empty-changeset
              ;;
            compute-dev|compute-staging|compute-prod)
              ENV="${STACK#compute-}"

              SUBNET1=$(aws cloudformation list-exports \
                --query "Exports[?Name=='dost-pagasa-private-subnet-${ENV}-1'].Value" \
                --output text)
              SUBNET2=$(aws cloudformation list-exports \
                --query "Exports[?Name=='dost-pagasa-private-subnet-${ENV}-2'].Value" \
                --output text)

              # Set instance size per environment
              case "$ENV" in
                dev)     INSTANCE=t3.small;  MIN=1; MAX=2;  DESIRED=1; KEY=dost-pagasa-dev-key ;;
                staging) INSTANCE=t3.medium; MIN=2; MAX=4;  DESIRED=2; KEY=dost-pagasa-staging-key ;;
                prod)    INSTANCE=t3.large;  MIN=2; MAX=10; DESIRED=3; KEY=dost-pagasa-prod-key ;;
              esac

              aws cloudformation deploy \
                --stack-name "dost-pagasa-compute-${ENV}" \
                --template-file cloudformation/templates/compute.yaml \
                --parameter-overrides \
                  Environment=$ENV \
                  PrivateSubnet1Id=$SUBNET1 \
                  PrivateSubnet2Id=$SUBNET2 \
                  InstanceType=$INSTANCE \
                  MinCapacity=$MIN \
                  MaxCapacity=$MAX \
                  DesiredCapacity=$DESIRED \
                  KeyPairName=$KEY \
                --capabilities CAPABILITY_NAMED_IAM \
                --tags Project=DOST-PAGASA Environment=${ENV} \
                --no-fail-on-empty-changeset
              ;;
          esac

          echo "✅ Stack dost-pagasa-${STACK} deployed"
