# =============================================================================
# DOST PAGASA — Root Stack (Shared Infrastructure)
# Deploys: Network, Security, Cache, Storage, Certificates, Monitoring
# NOTE: Compute stacks are deployed separately per environment.
# =============================================================================
AWSTemplateFormatVersion: "2010-09-09"
Description: >-
  DOST PAGASA Shared Infrastructure — single VPC with all shared services.
  Compute (EC2/ALB) is deployed separately per environment.

Parameters:
  TemplatesBucketName:
    Type: String
    Default: dost-pagasa-cfn-templates
  # Network
  VpcCidr:
    Type: String
    Default: "10.2.0.0/16"
  PublicSubnet1Cidr:
    Type: String
    Default: "10.2.1.0/24"
  PublicSubnet2Cidr:
    Type: String
    Default: "10.2.2.0/24"
  PrivateSubnetDev1Cidr:
    Type: String
    Default: "10.2.10.0/24"
  PrivateSubnetDev2Cidr:
    Type: String
    Default: "10.2.11.0/24"
  PrivateSubnetStaging1Cidr:
    Type: String
    Default: "10.2.20.0/24"
  PrivateSubnetStaging2Cidr:
    Type: String
    Default: "10.2.21.0/24"
  PrivateSubnetProd1Cidr:
    Type: String
    Default: "10.2.30.0/24"
  PrivateSubnetProd2Cidr:
    Type: String
    Default: "10.2.31.0/24"
  OnPremisesPublicIp:
    Type: String
    Default: "122.55.201.79"
  OnPremisesCidr:
    Type: String
    Default: "10.100.100.0/24"
  BastionKeyPairName:
    Type: String
    Description: EC2 Key Pair for bastion host
  # Domain
  DomainName:
    Type: String
    Default: "pagasa.dost.gov.ph"
  SubjectAlternativeNames:
    Type: CommaDelimitedList
    Default: "www.pagasa.dost.gov.ph,bagong.pagasa.dost.gov.ph"
  CdnDomainName:
    Type: String
    Default: "cdn.pagasa.dost.gov.ph"
  # Cache
  CacheNodeType:
    Type: String
    Default: cache.t3.medium
  NumCacheClusters:
    Type: Number
    Default: 2
  # Monitoring
  AlarmEmail:
    Type: String
    Default: "dev.pagasa@gmail.com"
    Description: Email for alarm notifications (reserved for monitoring stack)
  # WAF
  RateLimitPerIp:
    Type: Number
    Default: 2000

Resources:
  # 1. Certificates
  CertificatesStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub "https://${TemplatesBucketName}.s3.ap-southeast-1.amazonaws.com/templates/certificates.yaml"
      Parameters:
        Environment: prod
        DomainName: !Ref DomainName
        SubjectAlternativeNames: !Join [",", !Ref SubjectAlternativeNames]
      Tags:
        - Key: Project
          Value: DOST-PAGASA

  # 2. Network (single VPC with all subnets + bastion)
  NetworkStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub "https://${TemplatesBucketName}.s3.ap-southeast-1.amazonaws.com/templates/network.yaml"
      Parameters:
        VpcCidr: !Ref VpcCidr
        PublicSubnet1Cidr: !Ref PublicSubnet1Cidr
        PublicSubnet2Cidr: !Ref PublicSubnet2Cidr
        PrivateSubnetDev1Cidr: !Ref PrivateSubnetDev1Cidr
        PrivateSubnetDev2Cidr: !Ref PrivateSubnetDev2Cidr
        PrivateSubnetStaging1Cidr: !Ref PrivateSubnetStaging1Cidr
        PrivateSubnetStaging2Cidr: !Ref PrivateSubnetStaging2Cidr
        PrivateSubnetProd1Cidr: !Ref PrivateSubnetProd1Cidr
        PrivateSubnetProd2Cidr: !Ref PrivateSubnetProd2Cidr
        OnPremisesPublicIp: !Ref OnPremisesPublicIp
        OnPremisesCidr: !Ref OnPremisesCidr
        BastionKeyPairName: !Ref BastionKeyPairName
      Tags:
        - Key: Project
          Value: DOST-PAGASA

  # 3. Security (shared SGs, WAF, GuardDuty)
  SecurityStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub "https://${TemplatesBucketName}.s3.ap-southeast-1.amazonaws.com/templates/security.yaml"
      Parameters:
        Environment: prod
        VpcId: !GetAtt NetworkStack.Outputs.VpcId
        BastionSecurityGroupId: !GetAtt NetworkStack.Outputs.BastionSecurityGroupId
        RateLimitPerIp: !Ref RateLimitPerIp
      Tags:
        - Key: Project
          Value: DOST-PAGASA

  # 4. Cache (shared ElastiCache — uses prod subnets)
  CacheStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub "https://${TemplatesBucketName}.s3.ap-southeast-1.amazonaws.com/templates/cache.yaml"
      Parameters:
        Environment: prod
        PrivateSubnet1Id: !GetAtt NetworkStack.Outputs.PrivateSubnetProd1Id
        PrivateSubnet2Id: !GetAtt NetworkStack.Outputs.PrivateSubnetProd2Id
        CacheSecurityGroupId: !GetAtt SecurityStack.Outputs.CacheSecurityGroupId
        NodeType: !Ref CacheNodeType
        NumCacheClusters: !Ref NumCacheClusters
      Tags:
        - Key: Project
          Value: DOST-PAGASA

  # 5. Storage (shared S3 + CloudFront)
  StorageStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub "https://${TemplatesBucketName}.s3.ap-southeast-1.amazonaws.com/templates/storage.yaml"
      Parameters:
        Environment: prod
        DomainName: !Ref CdnDomainName
        AcmCertificateArn: !GetAtt CertificatesStack.Outputs.CertificateArn
      Tags:
        - Key: Project
          Value: DOST-PAGASA

Outputs:
  VpcId:
    Value: !GetAtt NetworkStack.Outputs.VpcId
  PublicSubnet1Id:
    Value: !GetAtt NetworkStack.Outputs.PublicSubnet1Id
  PublicSubnet2Id:
    Value: !GetAtt NetworkStack.Outputs.PublicSubnet2Id
  PrivateSubnetDev1Id:
    Value: !GetAtt NetworkStack.Outputs.PrivateSubnetDev1Id
  PrivateSubnetDev2Id:
    Value: !GetAtt NetworkStack.Outputs.PrivateSubnetDev2Id
  PrivateSubnetStaging1Id:
    Value: !GetAtt NetworkStack.Outputs.PrivateSubnetStaging1Id
  PrivateSubnetStaging2Id:
    Value: !GetAtt NetworkStack.Outputs.PrivateSubnetStaging2Id
  PrivateSubnetProd1Id:
    Value: !GetAtt NetworkStack.Outputs.PrivateSubnetProd1Id
  PrivateSubnetProd2Id:
    Value: !GetAtt NetworkStack.Outputs.PrivateSubnetProd2Id
  AlbSecurityGroupId:
    Value: !GetAtt SecurityStack.Outputs.AlbSecurityGroupId
  Ec2SecurityGroupId:
    Value: !GetAtt SecurityStack.Outputs.Ec2SecurityGroupId
  WafWebAclArn:
    Value: !GetAtt SecurityStack.Outputs.WafWebAclArn
  CertificateArn:
    Value: !GetAtt CertificatesStack.Outputs.CertificateArn
  BastionPublicIp:
    Value: !GetAtt NetworkStack.Outputs.BastionPublicIp
  CloudFrontDomain:
    Value: !GetAtt StorageStack.Outputs.CloudFrontDomainName
  ValkeyEndpoint:
    Value: !GetAtt CacheStack.Outputs.ValkeyPrimaryEndpoint
