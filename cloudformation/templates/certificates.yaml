# =============================================================================
# DOST PAGASA - Certificates Stack
# Imports: nothing (standalone)
# =============================================================================
AWSTemplateFormatVersion: "2010-09-09"
Description: DOST PAGASA ACM Certificate with DNS validation.

Parameters:
  DomainName:
    Type: String
    Default: "pagasa.dost.gov.ph"
  SubjectAlternativeNames:
    Type: CommaDelimitedList
    Default: "www.pagasa.dost.gov.ph,bagong.pagasa.dost.gov.ph"

Conditions:
  HasSANs: !Not [!Equals [!Select [0, !Ref SubjectAlternativeNames], ""]]

Resources:
  Certificate:
    Type: AWS::CertificateManager::Certificate
    Properties:
      DomainName: !Ref DomainName
      SubjectAlternativeNames: !If
        - HasSANs
        - !Ref SubjectAlternativeNames
        - !Ref "AWS::NoValue"
      ValidationMethod: DNS
      Tags:
        - Key: Project
          Value: DOST-PAGASA

Outputs:
  CertificateArn:
    Value: !Ref Certificate
    Export:
      Name: dost-pagasa-certificate-arn
