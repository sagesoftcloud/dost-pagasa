# =============================================================================
# DOST PAGASA - CI/CD Pipeline Stack
# Main pipeline: Source → Build → Deploy-Staging → Approval → Deploy-Prod
# Does NOT auto-trigger on creation (DetectChanges: false)
# =============================================================================
AWSTemplateFormatVersion: "2010-09-09"
Description: DOST PAGASA CodePipeline - staging to prod promotion with manual approval.

Parameters:
  GitHubConnectionArn:
    Type: String
    Description: ARN of the CodeStar Connection to GitHub
  GitHubRepo:
    Type: String
    Default: "devpagasa/pagasa_website"
    Description: GitHub repository (owner/repo)
  GitHubBranch:
    Type: String
    Default: "staging"
    Description: Branch to trigger pipeline on
  ApprovalNotificationEmail:
    Type: String
    Default: ""
    Description: Email for prod deployment approval notifications (optional)

Conditions:
  HasApprovalEmail: !Not [!Equals [!Ref ApprovalNotificationEmail, ""]]

Resources:
  # ---------------------------------------------------------------------------
  # IAM Roles
  # ---------------------------------------------------------------------------
  CodeBuildServiceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: dost-pagasa-codebuild-service-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CodeBuildBasePolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource:
                  - !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/codebuild/dost-pagasa-website*"
                  - !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/codebuild/dost-pagasa-website*:*"
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:GetBucketLocation
                Resource:
                  - !Sub "arn:aws:s3:::dost-pagasa-pipeline-artifacts-${AWS::AccountId}/*"
                  - !Sub "arn:aws:s3:::dost-pagasa-pipeline-artifacts-${AWS::AccountId}"
                  - !Sub "arn:aws:s3:::dost-pagasa-codebuild-cache-${AWS::AccountId}/*"
                  - !Sub "arn:aws:s3:::dost-pagasa-codebuild-cache-${AWS::AccountId}"
              - Effect: Allow
                Action:
                  - codeconnections:UseConnection
                  - codeconnections:GetConnection
                Resource:
                  - !Sub "arn:aws:codeconnections:${AWS::Region}:${AWS::AccountId}:connection/*"
      Tags:
        - Key: Organization
          Value: DOST-PAGASA

  CodePipelineServiceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: dost-pagasa-pipeline-service-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: codepipeline.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CodePipelineBasePolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:GetBucketVersioning
                Resource:
                  - !Sub "arn:aws:s3:::dost-pagasa-pipeline-artifacts-${AWS::AccountId}/*"
                  - !Sub "arn:aws:s3:::dost-pagasa-pipeline-artifacts-${AWS::AccountId}"
              - Effect: Allow
                Action:
                  - codeconnections:UseConnection
                Resource:
                  - !Sub "arn:aws:codeconnections:${AWS::Region}:${AWS::AccountId}:connection/*"
              - Effect: Allow
                Action:
                  - codebuild:BatchGetBuilds
                  - codebuild:StartBuild
                Resource:
                  - !GetAtt CodeBuildProject.Arn
              - Effect: Allow
                Action:
                  - codedeploy:CreateDeployment
                  - codedeploy:GetDeployment
                  - codedeploy:GetDeploymentConfig
                  - codedeploy:GetApplicationRevision
                  - codedeploy:RegisterApplicationRevision
                Resource: "*"
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource:
                  - !If
                    - HasApprovalEmail
                    - !Ref ApprovalTopic
                    - !Sub "arn:aws:sns:${AWS::Region}:${AWS::AccountId}:dost-pagasa-prod-approval"
      Tags:
        - Key: Organization
          Value: DOST-PAGASA

  CodeDeployServiceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: dost-pagasa-codedeploy-service-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: codedeploy.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSCodeDeployRole
      Tags:
        - Key: Organization
          Value: DOST-PAGASA

  # ---------------------------------------------------------------------------
  # SNS Topic for Approval Notifications
  # ---------------------------------------------------------------------------
  ApprovalTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: dost-pagasa-prod-approval
      Tags:
        - Key: Organization
          Value: DOST-PAGASA

  ApprovalSubscription:
    Type: AWS::SNS::Subscription
    Condition: HasApprovalEmail
    Properties:
      TopicArn: !Ref ApprovalTopic
      Protocol: email
      Endpoint: !Ref ApprovalNotificationEmail

  # ---------------------------------------------------------------------------
  # CodeBuild Project
  # ---------------------------------------------------------------------------
  CodeBuildProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: dost-pagasa-website-build
      Description: Build DOST PAGASA PHP application
      ServiceRole: !GetAtt CodeBuildServiceRole.Arn
      Source:
        Type: CODEPIPELINE
        BuildSpec: buildspec.yml
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/amazonlinux-x86_64-standard:4.0
        EnvironmentVariables:
          - Name: APP_ENV
            Value: production
      Artifacts:
        Type: CODEPIPELINE
      Cache:
        Type: S3
        Location: !Sub "dost-pagasa-codebuild-cache-${AWS::AccountId}/composer-cache"
      LogsConfig:
        CloudWatchLogs:
          Status: ENABLED
          GroupName: /codebuild/dost-pagasa-website
      Tags:
        - Key: Organization
          Value: DOST-PAGASA

  # ---------------------------------------------------------------------------
  # CodeDeploy - Staging
  # ---------------------------------------------------------------------------
  CodeDeployAppStaging:
    Type: AWS::CodeDeploy::Application
    Properties:
      ApplicationName: dost-pagasa-staging-app
      ComputePlatform: Server

  DeploymentGroupStaging:
    Type: AWS::CodeDeploy::DeploymentGroup
    Properties:
      ApplicationName: !Ref CodeDeployAppStaging
      DeploymentGroupName: dost-pagasa-staging-dg
      ServiceRoleArn: !GetAtt CodeDeployServiceRole.Arn
      DeploymentConfigName: CodeDeployDefault.AllAtOnce
      Ec2TagFilters:
        - Key: Environment
          Value: staging
          Type: KEY_AND_VALUE
      AutoRollbackConfiguration:
        Enabled: true
        Events:
          - DEPLOYMENT_FAILURE

  # ---------------------------------------------------------------------------
  # CodeDeploy - Prod (ASG with ALB)
  # ---------------------------------------------------------------------------
  CodeDeployAppProd:
    Type: AWS::CodeDeploy::Application
    Properties:
      ApplicationName: dost-pagasa-prod-app
      ComputePlatform: Server

  DeploymentGroupProd:
    Type: AWS::CodeDeploy::DeploymentGroup
    Properties:
      ApplicationName: !Ref CodeDeployAppProd
      DeploymentGroupName: dost-pagasa-prod-dg
      ServiceRoleArn: !GetAtt CodeDeployServiceRole.Arn
      DeploymentConfigName: CodeDeployDefault.OneAtATime
      AutoScalingGroups:
        - !ImportValue dost-pagasa-prod-asg-name
      LoadBalancerInfo:
        TargetGroupInfoList:
          - Name: dost-pagasa-prod-tg
      DeploymentStyle:
        DeploymentType: IN_PLACE
        DeploymentOption: WITH_TRAFFIC_CONTROL
      AutoRollbackConfiguration:
        Enabled: true
        Events:
          - DEPLOYMENT_FAILURE
          - DEPLOYMENT_STOP_ON_REQUEST

  # ---------------------------------------------------------------------------
  # CodePipeline - Main (Staging → Approval → Prod)
  # ---------------------------------------------------------------------------
  Pipeline:
    Type: AWS::CodePipeline::Pipeline
    Properties:
      Name: dost-pagasa-website-pipeline
      PipelineType: V2
      RoleArn: !GetAtt CodePipelineServiceRole.Arn
      ArtifactStore:
        Type: S3
        Location: !Sub "dost-pagasa-pipeline-artifacts-${AWS::AccountId}"
      Triggers:
        - ProviderType: CodeStarSourceConnection
          GitConfiguration:
            SourceActionName: Source
            Push:
              - Branches:
                  Includes:
                    - !Ref GitHubBranch
      Stages:
        # Stage 1: Source
        - Name: Source
          Actions:
            - Name: Source
              ActionTypeId:
                Category: Source
                Owner: AWS
                Provider: CodeStarSourceConnection
                Version: "1"
              Configuration:
                ConnectionArn: !Ref GitHubConnectionArn
                FullRepositoryId: !Ref GitHubRepo
                BranchName: !Ref GitHubBranch
              OutputArtifacts:
                - Name: SourceArtifact
              RunOrder: 1

        # Stage 2: Build
        - Name: Build
          Actions:
            - Name: Build
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: "1"
              Configuration:
                ProjectName: !Ref CodeBuildProject
              InputArtifacts:
                - Name: SourceArtifact
              OutputArtifacts:
                - Name: BuildArtifact
              RunOrder: 1

        # Stage 3: Deploy to Staging
        - Name: Deploy-Staging
          Actions:
            - Name: DeployToStaging
              ActionTypeId:
                Category: Deploy
                Owner: AWS
                Provider: CodeDeploy
                Version: "1"
              Configuration:
                ApplicationName: !Ref CodeDeployAppStaging
                DeploymentGroupName: !Ref DeploymentGroupStaging
              InputArtifacts:
                - Name: BuildArtifact
              RunOrder: 1

        # Stage 4: Manual Approval
        - Name: Approval
          Actions:
            - Name: ApproveForProd
              ActionTypeId:
                Category: Approval
                Owner: AWS
                Provider: Manual
                Version: "1"
              Configuration:
                NotificationArn: !Ref ApprovalTopic
                CustomData: "Review staging deployment. Approve to deploy to production."
              RunOrder: 1

        # Stage 5: Deploy to Prod
        - Name: Deploy-Prod
          Actions:
            - Name: DeployToProd
              ActionTypeId:
                Category: Deploy
                Owner: AWS
                Provider: CodeDeploy
                Version: "1"
              Configuration:
                ApplicationName: !Ref CodeDeployAppProd
                DeploymentGroupName: !Ref DeploymentGroupProd
              InputArtifacts:
                - Name: BuildArtifact
              RunOrder: 1

      Tags:
        - Key: Organization
          Value: DOST-PAGASA

Outputs:
  PipelineName:
    Value: !Ref Pipeline
    Export:
      Name: dost-pagasa-pipeline-name
  CodeBuildProjectName:
    Value: !Ref CodeBuildProject
    Export:
      Name: dost-pagasa-codebuild-project
