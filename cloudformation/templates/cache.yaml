# =============================================================================
# DOST PAGASA - Cache Stack
# Creates: ElastiCache Valkey cluster (cluster mode disabled)
# =============================================================================
AWSTemplateFormatVersion: "2010-09-09"
Description: DOST PAGASA ElastiCache Valkey node-based cluster.

Parameters:
  NodeType:
    Type: String
    Default: cache.m5.xlarge
  NumCacheClusters:
    Type: Number
    Default: 1
  EngineVersion:
    Type: String
    Default: "8.0"

Resources:
  CacheSubnetGroup:
    Type: AWS::ElastiCache::SubnetGroup
    Properties:
      CacheSubnetGroupName: dost-pagasa-cache-subnet
      Description: DOST PAGASA ElastiCache subnet group
      SubnetIds:
        - !ImportValue dost-pagasa-private-subnet-prod-1
        - !ImportValue dost-pagasa-private-subnet-prod-2

  ValkeyReplicationGroup:
    Type: AWS::ElastiCache::ReplicationGroup
    Properties:
      ReplicationGroupDescription: DOST PAGASA Valkey cluster
      ReplicationGroupId: dost-pagasa-valkey
      Engine: valkey
      EngineVersion: !Ref EngineVersion
      CacheNodeType: !Ref NodeType
      NumCacheClusters: !Ref NumCacheClusters
      CacheSubnetGroupName: !Ref CacheSubnetGroup
      SecurityGroupIds:
        - !ImportValue dost-pagasa-prod-cache-sg-id
      AutomaticFailoverEnabled: false
      MultiAZEnabled: false
      AtRestEncryptionEnabled: true
      TransitEncryptionEnabled: true
      SnapshotRetentionLimit: 7
      SnapshotWindow: "17:00-18:00"
      PreferredMaintenanceWindow: "sun:18:00-sun:19:00"
      AutoMinorVersionUpgrade: true
      Tags:
        - Key: Agency
          Value: DOST-PAGASA
        - Key: Locality
          Value: Quezon City
        - Key: Project
          Value: DOST-PAGASA

Outputs:
  ValkeyPrimaryEndpoint:
    Value: !GetAtt ValkeyReplicationGroup.PrimaryEndPoint.Address
    Export:
      Name: dost-pagasa-valkey-endpoint
  ValkeyPort:
    Value: !GetAtt ValkeyReplicationGroup.PrimaryEndPoint.Port
    Export:
      Name: dost-pagasa-valkey-port
