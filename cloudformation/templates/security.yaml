# =============================================================================
# DOST PAGASA - Security Stack (deploy per environment)
# Creates: Security Groups, WAF WebACL
# =============================================================================
AWSTemplateFormatVersion: "2010-09-09"
Description: DOST PAGASA Security - per-environment Security Groups and WAF.

Parameters:
  Environment:
    Type: String
    AllowedValues: [dev, staging, prod]
  RateLimitPerIp:
    Type: Number
    Default: 2000

Conditions:
  IsProd: !Equals [!Ref Environment, "prod"]

Resources:
  AlbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub "DOST PAGASA ${Environment} ALB - HTTP/HTTPS from internet"
      VpcId: !ImportValue dost-pagasa-vpc-id
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: "0.0.0.0/0"
          Description: !Sub "HTTP from internet (${Environment})"
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: "0.0.0.0/0"
          Description: !Sub "HTTPS from internet (${Environment})"
      SecurityGroupEgress:
        - IpProtocol: "-1"
          CidrIp: "0.0.0.0/0"
      Tags:
        - Key: Name
          Value: !Sub "dost-pagasa-${Environment}-alb-sg"
        - Key: Organization
          Value: DOST-PAGASA
        - Key: Locality
          Value: Quezon City
        - Key: Province
          Value: Metro Manila
        - Key: Environment
          Value: !Ref Environment

  Ec2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub "DOST PAGASA ${Environment} EC2 - ALB and bastion only"
      VpcId: !ImportValue dost-pagasa-vpc-id
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          SourceSecurityGroupId: !Ref AlbSecurityGroup
          Description: !Sub "HTTP from ALB (${Environment})"
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          SourceSecurityGroupId: !Ref AlbSecurityGroup
          Description: !Sub "HTTPS from ALB (${Environment})"
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          SourceSecurityGroupId: !ImportValue dost-pagasa-bastion-sg-id
          Description: !Sub "SSH from bastion host only (${Environment})"
      SecurityGroupEgress:
        - IpProtocol: "-1"
          CidrIp: "0.0.0.0/0"
      Tags:
        - Key: Name
          Value: !Sub "dost-pagasa-${Environment}-ec2-sg"
        - Key: Organization
          Value: DOST-PAGASA
        - Key: Locality
          Value: Quezon City
        - Key: Province
          Value: Metro Manila
        - Key: Environment
          Value: !Ref Environment

  CacheSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub "DOST PAGASA ${Environment} ElastiCache - EC2 only"
      VpcId: !ImportValue dost-pagasa-vpc-id
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 6379
          ToPort: 6379
          SourceSecurityGroupId: !Ref Ec2SecurityGroup
          Description: !Sub "Valkey from EC2 instances (${Environment})"
      SecurityGroupEgress:
        - IpProtocol: "-1"
          CidrIp: "0.0.0.0/0"
      Tags:
        - Key: Name
          Value: !Sub "dost-pagasa-${Environment}-cache-sg"
        - Key: Organization
          Value: DOST-PAGASA
        - Key: Locality
          Value: Quezon City
        - Key: Province
          Value: Metro Manila
        - Key: Environment
          Value: !Ref Environment

  WafWebAcl:
    Type: AWS::WAFv2::WebACL
    Condition: IsProd
    Properties:
      Name: !Sub "dost-pagasa-${Environment}-waf"
      Scope: REGIONAL
      DefaultAction:
        Allow: {}
      Description: !Sub "DOST PAGASA ${Environment} WAF"
      VisibilityConfig:
        SampledRequestsEnabled: true
        CloudWatchMetricsEnabled: true
        MetricName: !Sub "dost-pagasa-${Environment}-waf"
      Rules:
        - Name: AWSManagedRulesCommonRuleSet
          Priority: 1
          OverrideAction:
            None: {}
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesCommonRuleSet
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: CommonRuleSet
        - Name: AWSManagedRulesKnownBadInputsRuleSet
          Priority: 2
          OverrideAction:
            None: {}
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesKnownBadInputsRuleSet
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: KnownBadInputs
        - Name: AWSManagedRulesSQLiRuleSet
          Priority: 3
          OverrideAction:
            None: {}
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesSQLiRuleSet
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: SQLiRuleSet
        - Name: AWSManagedRulesAmazonIpReputationList
          Priority: 4
          OverrideAction:
            None: {}
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesAmazonIpReputationList
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: IpReputation
        - Name: RateLimitRule
          Priority: 5
          Action:
            Block: {}
          Statement:
            RateBasedStatement:
              Limit: !Ref RateLimitPerIp
              AggregateKeyType: IP
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: RateLimit
      Tags:
        - Key: Organization
          Value: DOST-PAGASA
        - Key: Locality
          Value: Quezon City
        - Key: Province
          Value: Metro Manila
        - Key: Environment
          Value: !Ref Environment

Outputs:
  AlbSecurityGroupId:
    Value: !Ref AlbSecurityGroup
    Export:
      Name: !Sub "dost-pagasa-${Environment}-alb-sg-id"
  Ec2SecurityGroupId:
    Value: !Ref Ec2SecurityGroup
    Export:
      Name: !Sub "dost-pagasa-${Environment}-ec2-sg-id"
  CacheSecurityGroupId:
    Value: !Ref CacheSecurityGroup
    Export:
      Name: !Sub "dost-pagasa-${Environment}-cache-sg-id"
  WafWebAclArn:
    Condition: IsProd
    Value: !GetAtt WafWebAcl.Arn
    Export:
      Name: !Sub "dost-pagasa-${Environment}-waf-acl-arn"
