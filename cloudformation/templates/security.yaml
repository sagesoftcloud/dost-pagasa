# =============================================================================
# DOST PAGASA - Security Stack
# Creates: WAF WebACL, Security Groups
# Imports: VpcId, BastionSecurityGroupId from network stack
# =============================================================================
AWSTemplateFormatVersion: "2010-09-09"
Description: DOST PAGASA Security - WAF WebACL and Security Groups.

Parameters:
  RateLimitPerIp:
    Type: Number
    Default: 2000
  OnPremisesCidr:
    Type: String
    Default: "10.100.100.0/24"
    Description: On-premises network CIDR for database access via VPN

Resources:
  AlbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: DOST PAGASA ALB - allows HTTP/HTTPS from internet
      VpcId: !ImportValue dost-pagasa-vpc-id
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: "0.0.0.0/0"
          Description: HTTP from internet
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: "0.0.0.0/0"
          Description: HTTPS from internet
      SecurityGroupEgress:
        - IpProtocol: "-1"
          CidrIp: "0.0.0.0/0"
      Tags:
        - Key: Name
          Value: dost-pagasa-alb-sg
        - Key: Project
          Value: DOST-PAGASA

  Ec2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: DOST PAGASA EC2 - ALB and bastion traffic only
      VpcId: !ImportValue dost-pagasa-vpc-id
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          SourceSecurityGroupId: !Ref AlbSecurityGroup
          Description: HTTP from ALB
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          SourceSecurityGroupId: !Ref AlbSecurityGroup
          Description: HTTPS from ALB
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          SourceSecurityGroupId: !ImportValue dost-pagasa-bastion-sg-id
          Description: SSH from bastion host only
      SecurityGroupEgress:
        - IpProtocol: "-1"
          CidrIp: "0.0.0.0/0"
      Tags:
        - Key: Name
          Value: dost-pagasa-ec2-sg
        - Key: Project
          Value: DOST-PAGASA

  CacheSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: DOST PAGASA ElastiCache - EC2 and on-premises database
      VpcId: !ImportValue dost-pagasa-vpc-id
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 6379
          ToPort: 6379
          SourceSecurityGroupId: !Ref Ec2SecurityGroup
          Description: Valkey from EC2 instances
        - IpProtocol: tcp
          FromPort: 6379
          ToPort: 6379
          CidrIp: !Ref OnPremisesCidr
          Description: Valkey from on-premises database via VPN
      SecurityGroupEgress:
        - IpProtocol: "-1"
          CidrIp: "0.0.0.0/0"
      Tags:
        - Key: Name
          Value: dost-pagasa-cache-sg
        - Key: Project
          Value: DOST-PAGASA

  WafWebAcl:
    Type: AWS::WAFv2::WebACL
    Properties:
      Name: dost-pagasa-waf
      Scope: REGIONAL
      DefaultAction:
        Allow: {}
      Description: DOST PAGASA WAF - protects ALB
      VisibilityConfig:
        SampledRequestsEnabled: true
        CloudWatchMetricsEnabled: true
        MetricName: dost-pagasa-waf
      Rules:
        - Name: AWSManagedRulesCommonRuleSet
          Priority: 1
          OverrideAction:
            None: {}
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesCommonRuleSet
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: CommonRuleSet
        - Name: AWSManagedRulesKnownBadInputsRuleSet
          Priority: 2
          OverrideAction:
            None: {}
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesKnownBadInputsRuleSet
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: KnownBadInputs
        - Name: AWSManagedRulesSQLiRuleSet
          Priority: 3
          OverrideAction:
            None: {}
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesSQLiRuleSet
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: SQLiRuleSet
        - Name: AWSManagedRulesAmazonIpReputationList
          Priority: 4
          OverrideAction:
            None: {}
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesAmazonIpReputationList
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: IpReputation
        - Name: RateLimitRule
          Priority: 5
          Action:
            Block: {}
          Statement:
            RateBasedStatement:
              Limit: !Ref RateLimitPerIp
              AggregateKeyType: IP
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: RateLimit
      Tags:
        - Key: Project
          Value: DOST-PAGASA

Outputs:
  AlbSecurityGroupId:
    Value: !Ref AlbSecurityGroup
    Export:
      Name: dost-pagasa-alb-sg-id
  Ec2SecurityGroupId:
    Value: !Ref Ec2SecurityGroup
    Export:
      Name: dost-pagasa-ec2-sg-id
  CacheSecurityGroupId:
    Value: !Ref CacheSecurityGroup
    Export:
      Name: dost-pagasa-cache-sg-id
  WafWebAclArn:
    Value: !GetAtt WafWebAcl.Arn
    Export:
      Name: dost-pagasa-waf-acl-arn
