# =============================================================================
# DOST PAGASA - Storage Stack
# Imports: certificate ARN from certificates stack
# Includes: CDN assets, access logs, per-env file storage, CodeBuild cache,
#           and CodePipeline artifacts buckets
# =============================================================================
AWSTemplateFormatVersion: "2010-09-09"
Description: DOST PAGASA S3 + CloudFront CDN + App File Storage + Pipeline Buckets.

Parameters:
  CdnDomainName:
    Type: String
    Default: ""
  AcmCertificateArn:
    Type: String
    Default: ""

Conditions:
  HasCustomDomain: !Not [!Equals [!Ref CdnDomainName, ""]]

Resources:
  AccessLogsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "dost-pagasa-access-logs-${AWS::AccountId}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          - Id: ExpireOldLogs
            Status: Enabled
            ExpirationInDays: 365
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerPreferred
      Tags:
        - Key: Organization
          Value: DOST-PAGASA
        - Key: Locality
          Value: Quezon City
        - Key: Province
          Value: Metro Manila

  AssetsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "dost-pagasa-assets-${AWS::AccountId}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: TransitionOldVersions
            Status: Enabled
            NoncurrentVersionTransitions:
              - StorageClass: STANDARD_IA
                TransitionInDays: 30
            NoncurrentVersionExpiration:
              NoncurrentDays: 90
      LoggingConfiguration:
        DestinationBucketName: !Ref AccessLogsBucket
        LogFilePrefix: s3-access-logs/
      Tags:
        - Key: Organization
          Value: DOST-PAGASA
        - Key: Locality
          Value: Quezon City
        - Key: Province
          Value: Metro Manila

  AssetsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref AssetsBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontOAC
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${AssetsBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}"

  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: dost-pagasa-oac
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: DOST PAGASA CDN
        DefaultRootObject: index.html
        HttpVersion: http2and3
        PriceClass: PriceClass_200
        Aliases: !If
          - HasCustomDomain
          - [!Ref CdnDomainName]
          - !Ref "AWS::NoValue"
        ViewerCertificate: !If
          - HasCustomDomain
          - AcmCertificateArn: !Ref AcmCertificateArn
            SslSupportMethod: sni-only
            MinimumProtocolVersion: TLSv1.2_2021
          - CloudFrontDefaultCertificate: true
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt AssetsBucket.RegionalDomainName
            OriginAccessControlId: !Ref CloudFrontOAC
            S3OriginConfig:
              OriginAccessIdentity: ""
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          Compress: true
          AllowedMethods: [GET, HEAD, OPTIONS]
          CachedMethods: [GET, HEAD]
        Logging:
          Bucket: !GetAtt AccessLogsBucket.DomainName
          IncludeCookies: false
          Prefix: cloudfront-logs/
      Tags:
        - Key: Organization
          Value: DOST-PAGASA
        - Key: Locality
          Value: Quezon City
        - Key: Province
          Value: Metro Manila

  # ---------------------------------------------------------------------------
  # Per-Environment App File Storage Buckets
  # ---------------------------------------------------------------------------
  DevFilesBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "dost-pagasa-dev-files-${AWS::AccountId}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: TransitionOldVersions
            Status: Enabled
            NoncurrentVersionTransitions:
              - StorageClass: STANDARD_IA
                TransitionInDays: 30
            NoncurrentVersionExpiration:
              NoncurrentDays: 90
      Tags:
        - Key: Organization
          Value: DOST-PAGASA
        - Key: Locality
          Value: Quezon City
        - Key: Province
          Value: Metro Manila
        - Key: Environment
          Value: dev

  StagingFilesBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "dost-pagasa-staging-files-${AWS::AccountId}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: TransitionOldVersions
            Status: Enabled
            NoncurrentVersionTransitions:
              - StorageClass: STANDARD_IA
                TransitionInDays: 30
            NoncurrentVersionExpiration:
              NoncurrentDays: 90
      Tags:
        - Key: Organization
          Value: DOST-PAGASA
        - Key: Locality
          Value: Quezon City
        - Key: Province
          Value: Metro Manila
        - Key: Environment
          Value: staging

  ProdFilesBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "dost-pagasa-prod-files-${AWS::AccountId}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: TransitionOldVersions
            Status: Enabled
            NoncurrentVersionTransitions:
              - StorageClass: STANDARD_IA
                TransitionInDays: 30
            NoncurrentVersionExpiration:
              NoncurrentDays: 90
      Tags:
        - Key: Organization
          Value: DOST-PAGASA
        - Key: Locality
          Value: Quezon City
        - Key: Province
          Value: Metro Manila
        - Key: Environment
          Value: prod

  # ---------------------------------------------------------------------------
  # CodeBuild Cache Bucket (shared, prefixed per environment)
  # ---------------------------------------------------------------------------
  CodeBuildCacheBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "dost-pagasa-codebuild-cache-${AWS::AccountId}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          - Id: ExpireCache
            Status: Enabled
            ExpirationInDays: 30
      Tags:
        - Key: Organization
          Value: DOST-PAGASA
        - Key: Locality
          Value: Quezon City
        - Key: Province
          Value: Metro Manila

  # ---------------------------------------------------------------------------
  # CodePipeline Artifacts Bucket (shared across all pipelines)
  # ---------------------------------------------------------------------------
  PipelineArtifactsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "dost-pagasa-pipeline-artifacts-${AWS::AccountId}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          - Id: ExpireOldArtifacts
            Status: Enabled
            ExpirationInDays: 30
      Tags:
        - Key: Organization
          Value: DOST-PAGASA
        - Key: Locality
          Value: Quezon City
        - Key: Province
          Value: Metro Manila

Outputs:
  AssetsBucketName:
    Value: !Ref AssetsBucket
    Export:
      Name: dost-pagasa-assets-bucket
  CloudFrontDistributionId:
    Value: !Ref CloudFrontDistribution
    Export:
      Name: dost-pagasa-cloudfront-id
  CloudFrontDomainName:
    Value: !GetAtt CloudFrontDistribution.DomainName
    Export:
      Name: dost-pagasa-cloudfront-domain
  DevFilesBucketName:
    Value: !Ref DevFilesBucket
    Export:
      Name: dost-pagasa-dev-files-bucket
  StagingFilesBucketName:
    Value: !Ref StagingFilesBucket
    Export:
      Name: dost-pagasa-staging-files-bucket
  ProdFilesBucketName:
    Value: !Ref ProdFilesBucket
    Export:
      Name: dost-pagasa-prod-files-bucket
  CodeBuildCacheBucketName:
    Value: !Ref CodeBuildCacheBucket
    Export:
      Name: dost-pagasa-codebuild-cache-bucket
  PipelineArtifactsBucketName:
    Value: !Ref PipelineArtifactsBucket
    Export:
      Name: dost-pagasa-pipeline-artifacts-bucket
  PipelineArtifactsBucketArn:
    Value: !GetAtt PipelineArtifactsBucket.Arn
    Export:
      Name: dost-pagasa-pipeline-artifacts-bucket-arn
