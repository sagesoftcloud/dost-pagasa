# =============================================================================
# DOST PAGASA - Dev CI/CD Pipeline Stack
# Simple pipeline: Source → Build → Deploy-Dev (no approval)
# Does NOT auto-trigger on creation (DetectChanges: false)
# =============================================================================
AWSTemplateFormatVersion: "2010-09-09"
Description: DOST PAGASA CodePipeline - dev environment (no approval gate).

Parameters:
  GitHubConnectionArn:
    Type: String
    Description: ARN of the CodeStar Connection to GitHub
  GitHubRepo:
    Type: String
    Default: "devpagasa/pagasa_website"
    Description: GitHub repository (owner/repo)
  GitHubBranch:
    Type: String
    Default: "dev"
    Description: Branch to trigger pipeline on

Resources:
  # ---------------------------------------------------------------------------
  # IAM Roles
  # ---------------------------------------------------------------------------
  CodeBuildServiceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: dost-pagasa-dev-codebuild-service-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CodeBuildBasePolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource:
                  - !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/codebuild/dost-pagasa-website-dev*"
                  - !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/codebuild/dost-pagasa-website-dev*:*"
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:GetBucketLocation
                Resource:
                  - !Sub "arn:aws:s3:::dost-pagasa-pipeline-artifacts-${AWS::AccountId}/*"
                  - !Sub "arn:aws:s3:::dost-pagasa-pipeline-artifacts-${AWS::AccountId}"
                  - !Sub "arn:aws:s3:::dost-pagasa-codebuild-cache-${AWS::AccountId}/*"
                  - !Sub "arn:aws:s3:::dost-pagasa-codebuild-cache-${AWS::AccountId}"
              - Effect: Allow
                Action:
                  - codeconnections:UseConnection
                  - codeconnections:GetConnection
                Resource:
                  - !Ref GitHubConnectionArn
      Tags:
        - Key: Organization
          Value: DOST-PAGASA

  CodePipelineServiceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: dost-pagasa-dev-pipeline-service-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: codepipeline.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CodePipelineBasePolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:GetBucketVersioning
                Resource:
                  - !Sub "arn:aws:s3:::dost-pagasa-pipeline-artifacts-${AWS::AccountId}/*"
                  - !Sub "arn:aws:s3:::dost-pagasa-pipeline-artifacts-${AWS::AccountId}"
              - Effect: Allow
                Action:
                  - codeconnections:UseConnection
                Resource:
                  - !Ref GitHubConnectionArn
              - Effect: Allow
                Action:
                  - codebuild:BatchGetBuilds
                  - codebuild:StartBuild
                Resource:
                  - !GetAtt CodeBuildProject.Arn
              - Effect: Allow
                Action:
                  - codedeploy:CreateDeployment
                  - codedeploy:GetDeployment
                  - codedeploy:GetDeploymentConfig
                  - codedeploy:GetApplicationRevision
                  - codedeploy:RegisterApplicationRevision
                Resource: "*"
      Tags:
        - Key: Organization
          Value: DOST-PAGASA

  CodeDeployServiceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: dost-pagasa-dev-codedeploy-service-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: codedeploy.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSCodeDeployRole
      Tags:
        - Key: Organization
          Value: DOST-PAGASA

  # ---------------------------------------------------------------------------
  # CodeBuild Project
  # ---------------------------------------------------------------------------
  CodeBuildProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: dost-pagasa-website-dev-build
      Description: Build DOST PAGASA PHP application (dev)
      ServiceRole: !GetAtt CodeBuildServiceRole.Arn
      Source:
        Type: CODEPIPELINE
        BuildSpec: buildspec.yml
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/amazonlinux-x86_64-standard:4.0
        EnvironmentVariables:
          - Name: APP_ENV
            Value: development
      Artifacts:
        Type: CODEPIPELINE
      Cache:
        Type: S3
        Location: !Sub "dost-pagasa-codebuild-cache-${AWS::AccountId}/dev-composer-cache"
      LogsConfig:
        CloudWatchLogs:
          Status: ENABLED
          GroupName: /codebuild/dost-pagasa-website-dev
      Tags:
        - Key: Organization
          Value: DOST-PAGASA

  # ---------------------------------------------------------------------------
  # CodeDeploy - Dev
  # ---------------------------------------------------------------------------
  CodeDeployAppDev:
    Type: AWS::CodeDeploy::Application
    Properties:
      ApplicationName: dost-pagasa-dev-app
      ComputePlatform: Server

  DeploymentGroupDev:
    Type: AWS::CodeDeploy::DeploymentGroup
    Properties:
      ApplicationName: !Ref CodeDeployAppDev
      DeploymentGroupName: dost-pagasa-dev-dg
      ServiceRoleArn: !GetAtt CodeDeployServiceRole.Arn
      DeploymentConfigName: CodeDeployDefault.AllAtOnce
      Ec2TagFilters:
        - Key: Environment
          Value: dev
          Type: KEY_AND_VALUE
      AutoRollbackConfiguration:
        Enabled: true
        Events:
          - DEPLOYMENT_FAILURE

  # ---------------------------------------------------------------------------
  # CodePipeline - Dev (Source → Build → Deploy)
  # ---------------------------------------------------------------------------
  Pipeline:
    Type: AWS::CodePipeline::Pipeline
    Properties:
      Name: dost-pagasa-website-dev-pipeline
      PipelineType: V2
      RoleArn: !GetAtt CodePipelineServiceRole.Arn
      ArtifactStore:
        Type: S3
        Location: !Sub "dost-pagasa-pipeline-artifacts-${AWS::AccountId}"
      Triggers:
        - ProviderType: CodeStarSourceConnection
          GitConfiguration:
            SourceActionName: Source
            Push:
              - Branches:
                  Includes:
                    - !Ref GitHubBranch
      Stages:
        # Stage 1: Source
        - Name: Source
          Actions:
            - Name: Source
              ActionTypeId:
                Category: Source
                Owner: AWS
                Provider: CodeStarSourceConnection
                Version: "1"
              Configuration:
                ConnectionArn: !Ref GitHubConnectionArn
                FullRepositoryId: !Ref GitHubRepo
                BranchName: !Ref GitHubBranch
                DetectChanges: "false"
              OutputArtifacts:
                - Name: SourceArtifact
              RunOrder: 1

        # Stage 2: Build
        - Name: Build
          Actions:
            - Name: Build
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: "1"
              Configuration:
                ProjectName: !Ref CodeBuildProject
              InputArtifacts:
                - Name: SourceArtifact
              OutputArtifacts:
                - Name: BuildArtifact
              RunOrder: 1

        # Stage 3: Deploy to Dev
        - Name: Deploy-Dev
          Actions:
            - Name: DeployToDev
              ActionTypeId:
                Category: Deploy
                Owner: AWS
                Provider: CodeDeploy
                Version: "1"
              Configuration:
                ApplicationName: !Ref CodeDeployAppDev
                DeploymentGroupName: !Ref DeploymentGroupDev
              InputArtifacts:
                - Name: BuildArtifact
              RunOrder: 1

      Tags:
        - Key: Organization
          Value: DOST-PAGASA

Outputs:
  DevPipelineName:
    Value: !Ref Pipeline
    Export:
      Name: dost-pagasa-dev-pipeline-name
