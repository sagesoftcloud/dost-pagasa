# =============================================================================
# DOST PAGASA - Compute Stack (deploy per environment)
# Dev/Staging: standalone EC2 | Prod: ASG with ALB
# =============================================================================
AWSTemplateFormatVersion: "2010-09-09"
Description: DOST PAGASA Compute - EC2 instances per environment.

Parameters:
  Environment:
    Type: String
    AllowedValues: [dev, staging, prod]
  PrivateSubnet1Id:
    Type: String
  PrivateSubnet2Id:
    Type: String
  InstanceType:
    Type: String
    Default: t3.medium
  AmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2
  KeyPairName:
    Type: String
  MinCapacity:
    Type: Number
    Default: 1
  MaxCapacity:
    Type: Number
    Default: 2
  DesiredCapacity:
    Type: Number
    Default: 1
  AcmCertificateArn:
    Type: String
    Default: ""

Conditions:
  IsProd: !Equals [!Ref Environment, "prod"]
  IsNotProd: !Not [!Equals [!Ref Environment, "prod"]]
  HasCertificate: !And
    - !Equals [!Ref Environment, "prod"]
    - !Not [!Equals [!Ref AcmCertificateArn, ""]]

Resources:
  # ---------------------------------------------------------------------------
  # IAM Role (all environments)
  # ---------------------------------------------------------------------------
  Ec2InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "dost-pagasa-${Environment}-ec2-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
      Tags:
        - Key: Organization
          Value: DOST-PAGASA
        - Key: Locality
          Value: Quezon City
        - Key: Province
          Value: Metro Manila

  Ec2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref Ec2InstanceRole

  # ---------------------------------------------------------------------------
  # Standalone EC2 (dev/staging only)
  # ---------------------------------------------------------------------------
  StandaloneInstance:
    Type: AWS::EC2::Instance
    Condition: IsNotProd
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !Ref AmiId
      KeyName: !Ref KeyPairName
      SubnetId: !Ref PrivateSubnet1Id
      IamInstanceProfile: !Ref Ec2InstanceProfile
      SecurityGroupIds:
        - !ImportValue
            Fn::Sub: "dost-pagasa-${Environment}-ec2-sg-id"
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: 30
            VolumeType: gp3
            Encrypted: true
      MetadataOptions:
        HttpTokens: required
        HttpEndpoint: enabled
      Tags:
        - Key: Name
          Value: !Sub "dost-pagasa-${Environment}-app"
        - Key: Organization
          Value: DOST-PAGASA
        - Key: Locality
          Value: Quezon City
        - Key: Province
          Value: Metro Manila
        - Key: Environment
          Value: !Ref Environment
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euxo pipefail
          yum update -y
          yum install -y amazon-cloudwatch-agent

          # CloudWatch agent config
          cat > /opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json <<'CWCFG'
          {
            "metrics": {
              "namespace": "DOST-PAGASA",
              "metrics_collected": {
                "cpu": { "measurement": ["cpu_usage_idle","cpu_usage_user","cpu_usage_system"], "metrics_collection_interval": 60 },
                "mem": { "measurement": ["mem_used_percent"], "metrics_collection_interval": 60 },
                "disk": { "measurement": ["used_percent"], "metrics_collection_interval": 60, "resources": ["*"] }
              },
              "append_dimensions": { "InstanceId": "INSTANCE_ID_PLACEHOLDER" }
            },
            "logs": {
              "logs_collected": {
                "files": {
                  "collect_list": [
                    { "file_path": "/var/log/messages", "log_group_name": "/dost-pagasa/${Environment}/syslog", "log_stream_name": "{instance_id}" },
                    { "file_path": "/var/log/httpd/access_log", "log_group_name": "/dost-pagasa/${Environment}/httpd-access", "log_stream_name": "{instance_id}" },
                    { "file_path": "/var/log/httpd/error_log", "log_group_name": "/dost-pagasa/${Environment}/httpd-error", "log_stream_name": "{instance_id}" }
                  ]
                }
              }
            }
          }
          CWCFG
          INSTANCE_DIM='$''{aws:InstanceId}'
          sed -i "s|INSTANCE_ID_PLACEHOLDER|$INSTANCE_DIM|" /opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json
          /opt/aws/amazon-cloudwatch-agent/bin/amazon-cloudwatch-agent-ctl -a fetch-config -m ec2 -c file:/opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json -s

          # Enable PHP 7.4 from amazon-linux-extras
          amazon-linux-extras enable php7.4

          # Remove old PHP 5.4 to avoid multilib conflicts
          yum remove -y php-common php-cli php-fpm php-pdo php-mysqlnd 2>/dev/null || true

          # Install Apache and PHP 7.4 with FPM and extensions
          yum clean metadata
          yum install -y httpd php php-fpm php-cli php-common php-opcache \
            php-mbstring php-xml php-gd php-pecl-zip php-curl php-bcmath \
            php-pdo php-mysqlnd

          # Install php-pecl-redis via EPEL
          amazon-linux-extras install epel -y
          yum install -y php-pecl-redis

          # Configure PHP-FPM to work with Apache
          sed -i 's/^user = .*/user = apache/' /etc/php-fpm.d/www.conf
          sed -i 's/^group = .*/group = apache/' /etc/php-fpm.d/www.conf

          # Enable and start services
          systemctl enable httpd php-fpm
          systemctl start httpd php-fpm

          echo "DOST PAGASA ${Environment} initialized" > /var/log/init.log

  # ---------------------------------------------------------------------------
  # ALB + ASG (prod only)
  # ---------------------------------------------------------------------------
  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Condition: IsProd
    Properties:
      Name: dost-pagasa-prod-alb
      Scheme: internet-facing
      Type: application
      Subnets:
        - !ImportValue dost-pagasa-public-subnet-1
        - !ImportValue dost-pagasa-public-subnet-2
      SecurityGroups:
        - !ImportValue
            Fn::Sub: "dost-pagasa-${Environment}-alb-sg-id"
      Tags:
        - Key: Organization
          Value: DOST-PAGASA
        - Key: Locality
          Value: Quezon City
        - Key: Province
          Value: Metro Manila
        - Key: Environment
          Value: prod

  WafAlbAssociation:
    Type: AWS::WAFv2::WebACLAssociation
    Condition: IsProd
    Properties:
      ResourceArn: !Ref ApplicationLoadBalancer
      WebACLArn: !ImportValue
            Fn::Sub: "dost-pagasa-${Environment}-waf-acl-arn"

  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Condition: IsProd
    Properties:
      Name: dost-pagasa-prod-tg
      VpcId: !ImportValue dost-pagasa-vpc-id
      Port: 80
      Protocol: HTTP
      TargetType: instance
      HealthCheckPath: /health.html
      HealthCheckIntervalSeconds: 30
      HealthyThresholdCount: 3
      UnhealthyThresholdCount: 3
      Matcher:
        HttpCode: "200"
      Tags:
        - Key: Organization
          Value: DOST-PAGASA
        - Key: Locality
          Value: Quezon City
        - Key: Province
          Value: Metro Manila

  HttpListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Condition: IsProd
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - !If
          - HasCertificate
          - Type: redirect
            RedirectConfig:
              Protocol: HTTPS
              Port: "443"
              StatusCode: HTTP_301
          - Type: forward
            TargetGroupArn: !Ref TargetGroup

  HttpsListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Condition: HasCertificate
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 443
      Protocol: HTTPS
      SslPolicy: ELBSecurityPolicy-TLS13-1-2-2021-06
      Certificates:
        - CertificateArn: !Ref AcmCertificateArn
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

  LaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Condition: IsProd
    Properties:
      LaunchTemplateName: dost-pagasa-prod-lt
      LaunchTemplateData:
        ImageId: !Ref AmiId
        InstanceType: !Ref InstanceType
        KeyName: !Ref KeyPairName
        IamInstanceProfile:
          Arn: !GetAtt Ec2InstanceProfile.Arn
        SecurityGroupIds:
          - !ImportValue
            Fn::Sub: "dost-pagasa-${Environment}-ec2-sg-id"
        BlockDeviceMappings:
          - DeviceName: /dev/xvda
            Ebs:
              VolumeSize: 100
              VolumeType: gp3
              Encrypted: true
              DeleteOnTermination: true
        MetadataOptions:
          HttpTokens: required
          HttpPutResponseHopLimit: 1
          HttpEndpoint: enabled
        Monitoring:
          Enabled: true
        TagSpecifications:
          - ResourceType: instance
            Tags:
              - Key: Name
                Value: dost-pagasa-prod-app
              - Key: Organization
                Value: DOST-PAGASA
              - Key: Locality
                Value: Quezon City
              - Key: Province
                Value: Metro Manila
              - Key: Environment
                Value: prod
        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash
            set -euxo pipefail
            yum update -y
            yum install -y amazon-cloudwatch-agent

            # CloudWatch agent config
            cat > /opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json <<'CWCFG'
            {
              "metrics": {
                "namespace": "DOST-PAGASA",
                "metrics_collected": {
                  "cpu": { "measurement": ["cpu_usage_idle","cpu_usage_user","cpu_usage_system"], "metrics_collection_interval": 60 },
                  "mem": { "measurement": ["mem_used_percent"], "metrics_collection_interval": 60 },
                  "disk": { "measurement": ["used_percent"], "metrics_collection_interval": 60, "resources": ["*"] }
                },
                "append_dimensions": { "InstanceId": "INSTANCE_ID_PLACEHOLDER" }
              },
              "logs": {
                "logs_collected": {
                  "files": {
                    "collect_list": [
                      { "file_path": "/var/log/messages", "log_group_name": "/dost-pagasa/prod/syslog", "log_stream_name": "{instance_id}" },
                      { "file_path": "/var/log/httpd/access_log", "log_group_name": "/dost-pagasa/prod/httpd-access", "log_stream_name": "{instance_id}" },
                      { "file_path": "/var/log/httpd/error_log", "log_group_name": "/dost-pagasa/prod/httpd-error", "log_stream_name": "{instance_id}" }
                    ]
                  }
                }
              }
            }
            CWCFG
            INSTANCE_DIM='$''{aws:InstanceId}'
            sed -i "s|INSTANCE_ID_PLACEHOLDER|$INSTANCE_DIM|" /opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json
            /opt/aws/amazon-cloudwatch-agent/bin/amazon-cloudwatch-agent-ctl -a fetch-config -m ec2 -c file:/opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json -s

            # Enable PHP 7.4 from amazon-linux-extras
            amazon-linux-extras enable php7.4

            # Remove old PHP 5.4 to avoid multilib conflicts
            yum remove -y php-common php-cli php-fpm php-pdo php-mysqlnd 2>/dev/null || true

            # Install Apache and PHP 7.4 with FPM and extensions
            yum clean metadata
            yum install -y httpd php php-fpm php-cli php-common php-opcache \
              php-mbstring php-xml php-gd php-pecl-zip php-curl php-bcmath \
              php-pdo php-mysqlnd

            # Install php-pecl-redis via EPEL
            amazon-linux-extras install epel -y
            yum install -y php-pecl-redis

            # Configure PHP-FPM to work with Apache
            sed -i 's/^user = .*/user = apache/' /etc/php-fpm.d/www.conf
            sed -i 's/^group = .*/group = apache/' /etc/php-fpm.d/www.conf

            # Default landing page
            cat > /var/www/html/index.html <<'EOF'
            <!DOCTYPE html>
            <html lang="en">
            <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>DOST PAGASA</title>
              <style>
                body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: #f0f4f8; }
                .container { text-align: center; padding: 2rem; }
                h1 { color: #1a365d; }
                p { color: #4a5568; }
              </style>
            </head>
            <body>
              <div class="container">
                <h1>DOST PAGASA</h1>
                <p>Philippine Atmospheric, Geophysical and Astronomical Services Administration</p>
                <p>Production Environment</p>
              </div>
            </body>
            </html>
            EOF

            # Health check endpoint for ALB
            echo "OK" > /var/www/html/health.html

            # Enable and start services
            systemctl enable httpd php-fpm
            systemctl start httpd php-fpm

            echo "DOST PAGASA prod initialized" > /var/log/init.log

  AutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    Condition: IsProd
    Properties:
      AutoScalingGroupName: dost-pagasa-prod-asg
      LaunchTemplate:
        LaunchTemplateId: !Ref LaunchTemplate
        Version: !GetAtt LaunchTemplate.LatestVersionNumber
      MinSize: !Ref MinCapacity
      MaxSize: !Ref MaxCapacity
      DesiredCapacity: !Ref DesiredCapacity
      VPCZoneIdentifier:
        - !Ref PrivateSubnet1Id
        - !Ref PrivateSubnet2Id
      TargetGroupARNs:
        - !Ref TargetGroup
      HealthCheckType: ELB
      HealthCheckGracePeriod: 300
      Tags:
        - Key: Name
          Value: dost-pagasa-prod-asg
          PropagateAtLaunch: false
        - Key: Organization
          Value: DOST-PAGASA
          PropagateAtLaunch: true
        - Key: Locality
          Value: Quezon City
          PropagateAtLaunch: true
        - Key: Province
          Value: Metro Manila
          PropagateAtLaunch: true
        - Key: Environment
          Value: prod
          PropagateAtLaunch: true
    UpdatePolicy:
      AutoScalingRollingUpdate:
        MinInstancesInService: 0
        MaxBatchSize: 1
        PauseTime: PT5M

  ScalingPolicy:
    Type: AWS::AutoScaling::ScalingPolicy
    Condition: IsProd
    Properties:
      AutoScalingGroupName: !Ref AutoScalingGroup
      PolicyType: TargetTrackingScaling
      TargetTrackingConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ASGAverageCPUUtilization
        TargetValue: 60.0

Outputs:
  InstanceId:
    Condition: IsNotProd
    Value: !Ref StandaloneInstance
  AlbDnsName:
    Condition: IsProd
    Value: !GetAtt ApplicationLoadBalancer.DNSName
    Export:
      Name: dost-pagasa-prod-alb-dns
  AutoScalingGroupName:
    Condition: IsProd
    Value: !Ref AutoScalingGroup
    Export:
      Name: dost-pagasa-prod-asg-name
